[project]
name = "zenve-adapters"
version = "0.1.0"
description = "zenve agent adapter framework"
requires-python = ">=3.13"
dependencies = [
    "pydantic>=2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zenve_adapters"]


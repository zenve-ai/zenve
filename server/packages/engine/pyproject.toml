[project]
name = "zenve-engine"
version = "0.1.0"
description = "zenve agent run engine — parallel execution of agents against a .zenve/ repo"
requires-python = ">=3.13"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2",
    "python-dotenv>=1.0",
    "zenve-adapters",
    "zenve-models",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zenve_engine"]

[tool.uv.sources]
zenve-adapters = { workspace = true }
zenve-models = { workspace = true }

[project]
name = "zenve-engine"
version = "0.1.6"
description = "Zenve agent run engine — parallel execution of agents against a .zenve/ repo"
readme = "README.md"
requires-python = ">=3.13"
license = { text = "MIT" }
authors = [{ name = "Alexandru Ghiura", email = "ghalex@gmail.com" }]
keywords = ["zenve", "agents", "automation", "github", "claude"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "httpx>=0.27",
    "pydantic>=2",
    "python-dotenv>=1.0",
    "zenve-adapters>=0.1.6",
]

[project.urls]
Homepage = "https://github.com/zenve-ai/zenve"
Repository = "https://github.com/zenve-ai/zenve"
Issues = "https://github.com/zenve-ai/zenve/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zenve_engine"]

[tool.uv.sources]
zenve-adapters = { workspace = true }

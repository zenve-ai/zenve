[project]
name = "zenve-agents"
version = "0.1.0"
description = "zenve agent adapter framework"
requires-python = ">=3.13"
dependencies = [
    "zenve-models",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zenve_agents"]

[tool.uv.sources]
zenve-models = { workspace = true }

[project]
name = "zenve-models"
version = "0.1.0"
description = "zenve shared Pydantic models"
requires-python = ">=3.13"
dependencies = [
    "pydantic[email]>=2.10.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zenve_models"]

[project]
name = "zenve-services"
version = "0.1.0"
description = "zenve business logic services"
requires-python = ">=3.13"
dependencies = [
    "fastapi>=0.115.0",
    "httpx>=0.27.0",
    "pyyaml>=6.0",
    "sqlalchemy>=2.0.0",
    "zenve-config",
    "zenve-db",
    "zenve-models",
    "zenve-utils",
    "zenve-adapters",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zenve_services"]

[tool.uv.sources]
zenve-config = { workspace = true }
zenve-db = { workspace = true }
zenve-models = { workspace = true }
zenve-utils = { workspace = true }
zenve-adapters = { workspace = true }

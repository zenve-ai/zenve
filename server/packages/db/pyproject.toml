[project]
name = "zenve-db"
version = "0.1.0"
description = "zenve database models and connection"
requires-python = ">=3.13"
dependencies = [
    "sqlalchemy>=2.0.0",
    "psycopg2-binary>=2.9.0",
    "zenve-config",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zenve_db"]

[tool.uv.sources]
zenve-config = { workspace = true }

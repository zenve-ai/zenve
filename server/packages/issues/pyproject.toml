[project]
name = "zenve-issues"
version = "0.1.0"
description = "Zenve issue adapter framework — unified CRUD interface over GitHub Issues and SQLite"
requires-python = ">=3.13"
dependencies = [
    "pydantic>=2",
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zenve_issues"]

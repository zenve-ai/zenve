[project]
name = "zenve-github"
version = "0.1.0"
description = "Thin GitHub REST client for zenve"
requires-python = ">=3.13"
license = { text = "MIT" }
authors = [{ name = "Alexandru Ghiura", email = "ghalex@gmail.com" }]
dependencies = ["httpx>=0.27"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zenve_github"]

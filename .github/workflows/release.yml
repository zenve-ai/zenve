name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    name: Build & publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # PyPI trusted publishing (OIDC)
      contents: write   # GitHub release

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: latest

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build all packages
        working-directory: server
        run: |
          rm -rf dist
          uv build --package zenve-adapters
          uv build --package zenve-engine
          uv build --package zenve-runtime
          uv build --package zenve-cli
          ls -lh dist/

      - name: Publish to PyPI
        working-directory: server
        run: uv publish dist/*

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/zenve-ai/zenve/main/scripts/install.sh | sh
            ```

            Or install manually:

            ```bash
            uv tool install zenve-cli       # recommended
            pipx install zenve-cli          # alternative
            ```

            Upgrade:

            ```bash
            uv tool upgrade zenve-cli
            ```

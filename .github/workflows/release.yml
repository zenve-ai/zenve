name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: zenve-linux-x86_64
          - os: macos-latest
            asset: zenve-macos-arm64
          - os: macos-13
            asset: zenve-macos-x86_64
          - os: windows-latest
            asset: zenve-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: latest

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install workspace dependencies
        working-directory: server
        run: uv sync --all-packages

      - name: Build binary
        working-directory: server
        run: uv run --with pyinstaller pyinstaller apps/cli/zenve.spec --distpath apps/cli/dist --workpath /tmp/pyinstaller_build --noconfirm

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: mv server/apps/cli/dist/zenve server/apps/cli/dist/${{ matrix.asset }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Move-Item server/apps/cli/dist/zenve.exe server/apps/cli/dist/${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: server/apps/cli/dist/${{ matrix.asset }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Install

            **macOS / Linux (curl)**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | sh
            ```

            **Manual download**
            Pick the binary for your platform from the assets below and place it in your `$PATH`.

            | Platform | File |
            |---|---|
            | Linux x86_64 | `zenve-linux-x86_64` |
            | macOS arm64 (M1/M2/M3) | `zenve-macos-arm64` |
            | macOS x86_64 (Intel) | `zenve-macos-x86_64` |
            | Windows x86_64 | `zenve-windows-x86_64.exe` |
